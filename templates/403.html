{% if config['DEBUG'] %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap-icons.css') }}">
{% else %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
{% endif %}
{% block content %}
<div class="container vh-100 d-flex align-items-center justify-content-center text-center">
    <div class="p-5 border-0 shadow-sm rounded-4 bg-white" style="max-width: 500px">
        <div class="mb-4">
            <i class="bi bi-shield-lock-fill text-danger" style="font-size: 5rem"></i>
        </div>
        <h2 class="fw-bold mb-3">Restricted Access</h2>
        <p class="text-secondary mb-4">
            Sorry, you don't have the <strong>Pro Permissions</strong> required to
            access this area. If you believe this is an error, please contact support.
        </p>
        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
            <a href="javascript:history.back()" class="btn btn-outline-secondary btn-lg px-4 rounded-pill">
                Go Back
            </a>
        </div>
    </div>
</div>
{% endblock %}
{% if config['DEBUG'] %}
<script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/htmx.min.js') }}"></script>
{% else %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/htmx.org@1.9.10"></script>
{% endif %}
