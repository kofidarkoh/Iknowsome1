{% extends "admin/admin_base.html" %}
{% block admin_content %}
<div class="container-fluid py-4" style="max-width: 900px;">
    <h4 class="fw-bold mb-4">System Configuration</h4>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm rounded-4 h-100">
                <div class="card-body p-4 d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="fw-bold mb-1">Maintenance Mode</h6>
                        <p class="text-muted small mb-0">Disable the frontend for users.</p>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input fs-4" type="checkbox" role="switch" 
                               hx-post="{{ url_for('admin.toggle_setting') }}" 
                               hx-vals='{"key": "maintenance_mode"}'
                               {{ 'checked' if settings.get('maintenance_mode') == 'true' }}>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card border-0 shadow-sm rounded-4 h-100">
                <div class="card-body p-4 d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="fw-bold mb-1">User Registration</h6>
                        <p class="text-muted small mb-0">Allow new users to sign up.</p>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input fs-4" type="checkbox" role="switch"
                               hx-post="{{ url_for('admin.toggle_setting') }}" 
                               hx-vals='{"key": "allow_registration"}'
                               {{ 'checked' if settings.get('allow_registration') == 'true' }}>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="col-12">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <h6 class="fw-bold mb-3">Site Details</h6>
                    <form hx-post="/admin/update-site-meta" class="row g-3">
                        <div class="col-md-6">
                            <label class="small fw-bold">Platform Name</label>
                            <input type="text" name="site_name" class="form-control rounded-3" value="{{ settings.get('site_name', 'iKnowSome1') }}">
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold">Support Email</label>
                            <input type="email" name="support_email" class="form-control rounded-3" value="{{ settings.get('support_email', 'support@example.com') }}">
                        </div>
                        <div class="col-12 text-end">
                            <button class="btn btn-dark rounded-pill px-4">Save Meta</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
