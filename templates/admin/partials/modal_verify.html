<div class="modal-content border-0 rounded-4 shadow-lg p-3">
    <div class="modal-body text-center p-4">
        <div class="mb-3">
            <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3.5rem;"></i>
        </div>
        
        <h4 class="fw-bold">Manual Verification</h4>
        <p class="text-muted">
            Are you sure you want to manually verify <strong>{{ user.username }}</strong>? 
            This will approve their Email, Phone, and KYC status instantly.
        </p>

        <div class="d-grid gap-2 mt-4">
            <button hx-post="{{ url_for('admin.quick_verify', user_id=user.id) }}" 
                    hx-target="#user-{{ user.id }}" 
                    hx-swap="outerHTML"
                    data-bs-dismiss="modal" 
                    class="btn btn-primary rounded-pill py-2 fw-bold">
                Confirm & Verify
            </button>
            <button class="btn btn-light rounded-pill py-2" data-bs-dismiss="modal">
                Cancel
            </button>
        </div>
    </div>
</div>
