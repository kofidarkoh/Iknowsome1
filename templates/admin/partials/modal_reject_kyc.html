<div class="modal-content border-0 rounded-4 shadow">
    <div class="modal-header border-0 px-4 pt-4">
        <h5 class="fw-bold mb-0 text-danger">Reject Identity Documents</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    
    <form hx-post="{{ url_for('admin.reject_kyc', user_id=user.id) }}" 
          hx-target="#kyc-row-{{ user.id }}" 
          hx-swap="outerHTML"
          data-bs-dismiss="modal">
        <div class="modal-body px-4">
            <p class="text-muted small">
                Tell <strong>{{ user.username }}</strong> why their documents were rejected so they can re-upload them correctly.
            </p>
            <div class="mb-3">
                <label class="form-label small fw-bold">Rejection Reason</label>
                <textarea name="reason" class="form-control rounded-3" rows="3" 
                          placeholder="e.g. ID card is blurry, Name doesn't match profile, or Selfie is too dark." required></textarea>
            </div>
        </div>
        <div class="modal-footer border-0 px-4 pb-4">
            <button type="submit" class="btn btn-danger w-100 rounded-pill py-2 fw-bold">
                Send Rejection
            </button>
        </div>
    </form>
</div>
