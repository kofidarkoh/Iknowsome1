<tr id="row-{{ user.id }}" class="bg-light-subtle shadow-inner">
    <td colspan="2" class="ps-4">
        <span class="text-xs fw-black text-muted">EDITING: {{ user.username|upper }}</span>
    </td>
    <td colspan="2" class="pe-4 py-3">
        <form hx-post="{{ url_for('admin.update_user_verification', user_id=user.id) }}" 
              hx-target="#row-{{ user.id }}" 
              hx-swap="outerHTML" 
              class="d-flex align-items-center justify-content-end gap-3">
            
            <div class="form-check form-switch small">
                <input class="form-check-input" type="checkbox" name="email_v" {% if user.email_verified %}checked{% endif %}>
                <label class="text-xs fw-bold">Email</label>
            </div>
            
            <div class="form-check form-switch small">
                <input class="form-check-input" type="checkbox" name="phone_v" {% if user.phone_verified %}checked{% endif %}>
                <label class="text-xs fw-bold">Phone</label>
            </div>

            <button type="submit" class="btn btn-sm btn-success rounded-pill px-3 fw-bold text-xs">Save</button>
            <button type="button" 
                    hx-get="{{ url_for('admin.verification_manager') }}?search={{ user.username }}" 
                    hx-target="#verification-table-body"
                    class="btn btn-sm btn-light rounded-pill px-3 fw-bold text-xs">Cancel</button>
        </form>
    </td>
</tr>
