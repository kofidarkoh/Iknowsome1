<div class="modal-content border-0 rounded-4 p-3">
    <div class="modal-header border-0">
        <h5 class="fw-bold">Edit User</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    <form hx-post="{{ url_for('admin.update_user', user_id=user.id) }}" 
          hx-target="#user-{{ user.id }}" 
          hx-swap="outerHTML">
        <div class="modal-body">
            <div class="mb-3">
                <label class="small fw-bold">Username</label>
                <input type="text" name="username" class="form-control" value="{{ user.username }}">
            </div>
            <div class="mb-3">
                <label class="small fw-bold">Role</label>
                <select name="role" class="form-select">
                    <option value="customer" {{ 'selected' if user.role == 'customer' }}>Customer</option>
                    <option value="pro" {{ 'selected' if user.role == 'pro' }}>Professional</option>
                </select>
            </div>
        </div>
        <div class="modal-footer border-0">
            <button type="submit" class="btn btn-dark w-100 rounded-pill" data-bs-dismiss="modal">Save Changes</button>
        </div>
    </form>
</div>
