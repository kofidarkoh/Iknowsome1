{% extends "admin/admin_base.html" %}

{% block admin_content %}
<div class="container-fluid py-4">
    <div class="d-flex align-items-center justify-content-between mb-5">
        <div>
            <h3 class="fw-black mb-1">User Verifications</h3>
            <p class="text-muted small">Manage and manually approve user identity and contact status.</p>
        </div>
        <div class="position-relative">
            <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
            <input type="text" 
                   name="search" 
                   class="form-control rounded-pill border-0 shadow-sm ps-5" 
                   placeholder="Search user..."
                   hx-get="{{ url_for('admin.verification_manager') }}"
                   hx-trigger="keyup changed delay:500ms"
                   hx-target="#verification-table-body"
                   style="min-width: 300px; height: 45px;">
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="bg-light">
                    <tr class="text-xs fw-black text-muted text-uppercase">
                        <th class="ps-4 py-3">User Profile</th>
                        <th class="py-3">Contact Status</th>
                        <th class="py-3">Identity Status</th>
                        <th class="py-3 text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="verification-table-body">
                    {% include 'admin/partials/_verify_table.html' %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
