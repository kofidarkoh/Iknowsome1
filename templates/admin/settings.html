{% extends "admin/admin_base.html" %}
{% block admin_content %}
<div class="container-fluid py-4" style="max-width: 800px;">
    <div class="mb-4">
        <h4 class="fw-bold">Account Settings</h4>
        <p class="text-muted small">Manage your administrative profile and security preferences.</p>
    </div>

    <div class="card border-0 shadow-sm rounded-4 mb-4">
        <div class="card-body p-4">
            <h6 class="fw-bold mb-3">Public Profile</h6>
            <form hx-post="{{ url_for('admin.update_settings_profile') }}" 
                  hx-swap="none" 
                  hx-on::after-request="if(event.detail.successful) alert('Profile updated!')">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted">Username</label>
                        <input type="text" name="username" class="form-control rounded-3" value="{{ current_user.username }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted">Email Address</label>
                        <input type="email" name="email" class="form-control rounded-3" value="{{ current_user.email }}">
                    </div>
                    <div class="col-12 text-end">
                        <button type="submit" class="btn btn-dark rounded-pill px-4">Update Profile</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
            <h6 class="fw-bold mb-3">Change Password</h6>
            <form hx-post="{{ url_for('admin.update_settings_password') }}" 
                  hx-target="#password-msg"
                  hx-on::after-request="this.reset()">
                <div id="password-msg"></div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Current Password</label>
                    <input type="password" name="current_password" class="form-control rounded-3" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">New Password</label>
                    <input type="password" name="new_password" class="form-control rounded-3" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-control rounded-3" required>
                </div>
                <div class="text-end">
                    <button type="submit" class="btn btn-outline-dark rounded-pill px-4">Change Password</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
