{% if config['DEBUG'] %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap-icons.css') }}">
{% else %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
{% endif %}
{% block content %}
<div class="container vh-100 d-flex align-items-center justify-content-center text-center">
    <div>
        <h1 class="display-1 fw-bold text-warning" style="font-size: 8rem; opacity: 0.5;">404</h1>
        <h2 class="fw-bold mb-3">Lost in the Workspace?</h2>
        <p class="text-secondary mb-4">The page you're looking for has been moved or doesn't exist.</p>
        
        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
            <a href="javascript:history.back()" class="btn btn-outline-secondary btn-lg px-4 rounded-pill">
                Go Back
            </a>
        </div>
    </div>
</div>
{% endblock %}
    {% if config['DEBUG'] %}
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/htmx.min.js') }}"></script>
    {% else %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    {% endif %}
