<div style="font-family: sans-serif; text-align: center; padding: 40px; border: 1px solid #eee; border-radius: 15px; max-width: 500px; margin: auto;">
    <h2 style="margin-bottom: 5px;">Verification Code</h2>
    <p style="color: #666;">Use the code below to verify your account on Core.</p>
    
    <div style="background: #f8f9fa; padding: 20px; border-radius: 10px; margin: 30px 0;">
        <span style="font-size: 32px; font-weight: bold; letter-spacing: 5px; color: #1a1a1a;">
            {{ otp }}
        </span>
    </div>
    
    <p style="font-size: 12px; color: #999;">This code will expire in 10 minutes.</p>
</div>
